<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendas - Loja Esportiva</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header><h1>💰 Vendas</h1></header>
    <nav><!-- nav --></nav>
    <div class="container">
        <div class="card">
            <h2>Nova Venda</h2>
            <select id="clienteVenda" onchange="atualizarVenda()"></select>
            <button onclick="adicionarItemVenda()">Adicionar Item</button>
            <table id="itensVenda"></table>
            <p>Total: <strong id="totalVenda">R$ 0.00</strong></p>
            <button class="btn btn-success" onclick="finalizarVenda()">Finalizar Venda</button>
        </div>
        <div class="card">
            <h2>Histórico de Vendas</h2>
            <table id="tabelaVendas"></table>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
